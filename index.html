<!DOCTYPE html> 
<html lang="hi"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Swami Mobiles</title> 
<style> 
 * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; } 
 html, body { height: 100%; } 
 body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; overflow-x: hidden; background: linear-gradient(160deg, #1b2a4a 0%, #1f4e5f 18%, #2a6b6b 35%, #d97a5e 60%, #e2654f 75%, #7a2d3a 100%); } 
 body::before, body::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; } 
 body::before { width: 420px; height: 420px; background: rgba(255, 130, 90, 0.45); top: -100px; left: -100px; } 
 body::after { width: 380px; height: 380px; background: rgba(40, 180, 170, 0.4); bottom: -80px; right: -80px; } 
 .triangle { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 260px solid transparent; border-right: 260px solid transparent; border-bottom: 480px solid rgba(255,255,255,0.06); z-index: 0; } 
 
 /* Auth Container */
 .container { position: relative; z-index: 1; width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.10); border: 1.5px solid rgba(255, 255, 255, 0.35); border-radius: 22px; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); box-shadow: 0 25px 60px rgba(0,0,0,0.35); padding: 40px 32px; color: #fff; } 
 .tabs { display: flex; gap: 28px; justify-content: center; margin-bottom: 30px; } 
 .tab-btn { background: none; border: none; font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.5); cursor: pointer; padding-bottom: 6px; transition: 0.25s; letter-spacing: 0.5px; } 
 .tab-btn.active { color: #fff; font-weight: 600; border-bottom: 2px solid #fff; } 
 .toggle-method { display: flex; justify-content: center; gap: 6px; margin-bottom: 26px; } 
 .toggle-method button { padding: 6px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; } 
 .toggle-method button.active { background: #fff; color: #2a6b6b; border-color: #fff; } 
 .input-group { margin-bottom: 26px; position: relative; } 
 .input-group label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 8px; letter-spacing: 0.3px; } 
 .input-group input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,0.55); padding: 6px 2px 10px; font-size: 15px; color: #fff; outline: none; transition: 0.25s; } 
 .input-group input::placeholder { color: rgba(255,255,255,0.45); } 
 .input-group input:focus { border-bottom-color: #fff; } 
 .options-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; margin-bottom: 26px; color: rgba(255,255,255,0.8); } 
 .options-row a { color: #fff; text-decoration: none; font-weight: 600; } 
 .checkbox-row { display: flex; align-items: center; gap: 6px; } 
 .checkbox-row input { width: 14px; height: 14px; accent-color: #fff; } 
 .submit-btn { width: 100%; padding: 14px 0; background: #fff; color: #2a4a4a; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; transition: transform 0.15s, box-shadow 0.15s; } 
 .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); } 
 .switch-text { text-align: center; margin-top: 20px; font-size: 13.5px; color: rgba(255,255,255,0.85); } 
 .switch-text a { color: #fff; font-weight: 700; text-decoration: underline; cursor: pointer; } 
 .divider { display: flex; align-items: center; text-align: center; margin: 24px 0 18px; color: rgba(255,255,255,0.6); font-size: 12px; } 
 .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.3); } 
 .divider span { padding: 0 12px; } 
 .social-buttons { display: flex; gap: 12px; } 
 .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 0; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 12px; background: rgba(255,255,255,0.08); font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; transition: 0.2s; } 
 .social-btn:hover { background: rgba(255,255,255,0.2); } 
 .social-btn svg { width: 18px; height: 18px; } 
 
 /* --- HEADER / SEARCH BAR STYLES --- */
 .main-header { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; z-index: 100; }
 .search-box { display: flex; align-items: center; background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 30px; padding: 8px 18px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); }
 .search-box input { width: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; padding-left: 10px; }
 .search-box input::placeholder { color: rgba(255, 255, 255, 0.55); }
 .search-box svg { width: 20px; height: 20px; fill: rgba(255, 255, 255, 0.7); }

 /* --- EMPTY CONTAINER FOR MAIN CONTENT --- */
 .app-content { position: relative; z-index: 1; width: 100%; max-width: 400px; min-height: 200px; background: rgba(255, 255, 255, 0.95); border-radius: 22px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); padding: 30px; color: #333; text-align: center; margin-top: 60px; margin-bottom: 80px; }

 /* --- BOTTOM NAVIGATION BAR STYLES --- */
 .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 380px; background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); z-index: 999; }
 .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: rgba(255, 255, 255, 0.65); font-size: 11px; font-weight: 500; cursor: pointer; transition: 0.3s; text-decoration: none; flex: 1; }
 .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 4px; transition: 0.3s; }
 .nav-item:hover, .nav-item.active { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.6); }
 
 /* Unique Floating Cart Button */
 .nav-item.unique-cart { position: relative; top: -22px; background: linear-gradient(135deg, #e2654f 0%, #d97a5e 100%); border: 3px solid rgba(255, 255, 255, 0.2); width: 62px; height: 62px; flex: none; border-radius: 50%; color: #fff; box-shadow: 0 8px 20px rgba(226, 101, 79, 0.5); }
 .nav-item.unique-cart svg { margin-bottom: 0; width: 26px; height: 26px; }
 .nav-item.unique-cart:hover { transform: scale(1.08); box-shadow: 0 10px 25px rgba(226, 101, 79, 0.7); }

 .hidden { display: none !important; } 

 @media (max-width: 420px) { 
 .container, .app-content { padding: 32px 22px; } 
 .tab-btn { font-size: 20px; }
 } 
</style> 
</head> 
<body> 
 <div class="triangle"></div> 

 <!-- 1. TOP SEARCH BAR -->
 <header class="main-header hidden" id="appHeader">
 <div class="search-box">
 <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
 <input type="text" placeholder="Search mobile, accessories...">
 </div>
 </header>

 <!-- 2. LOGIN / SIGNUP BOX -->
 <div class="container" id="authContainer"> 
 <div class="tabs"> 
 <button class="tab-btn active" id="loginTabBtn">login</button> 
 <button class="tab-btn" id="signupTabBtn">register</button> 
 </div> 

 <!-- LOGIN FORM --> 
 <div id="loginForm"> 
 <div class="toggle-method"> 
 <button class="active" id="loginEmailBtn">Email</button> 
 <button id="loginPhoneBtn">Phone</button> 
 </div> 
 <form id="mainLoginForm"> 
 <div class="input-group" id="loginEmailGroup"> 
 <label>Email</label> 
 <input type="email" id="loginEmail" placeholder="aapka@email.com" required> 
 </div> 
 <div class="input-group hidden" id="loginPhoneGroup"> 
 <label>Phone Number</label> 
 <input type="tel" id="loginPhone" placeholder="+91 98765 43210"> 
 </div> 
 <div class="input-group"> 
 <label>Password</label> 
 <input type="password" id="loginPassword" placeholder="••••••••" required> 
 </div> 
 <div class="options-row"> 
 <label class="checkbox-row"> 
 <input type="checkbox"> Remember me 
 </label> 
 <a href="#" id="forgotPasswordLink">Forgot Password?</a> 
 </div> 
 <button type="submit" class="submit-btn">Login</button> 
 </form> 
 <div class="divider"><span>or continue with</span></div> 
 <div class="social-buttons"> 
 <button class="social-btn google-login-btn">Google</button> 
 <button class="social-btn facebook-login-btn">Facebook</button> 
 </div> 
 <p class="switch-text">Don't have an account? <a id="goToSignupLink">Register</a></p> 
 </div> 

 <!-- SIGNUP FORM --> 
 <div id="signupForm" class="hidden"> 
 <div class="toggle-method"> 
 <button class="active" id="signupEmailBtn">Email</button> 
 <button id="signupPhoneBtn">Phone</button> 
 </div> 
 <form id="mainSignupForm"> 
 <div class="input-group"> 
 <label>Full Name</label> 
 <input type="text" id="signupName" placeholder="Aapka naam" required> 
 </div> 
 <div class="input-group" id="signupEmailGroup"> 
 <label>Email</label> 
 <input type="email" id="signupEmail" placeholder="aapka@email.com" required> 
 </div> 
 <div class="input-group hidden" id="signupPhoneGroup"> 
 <label>Phone Number</label> 
 <input type="tel" id="signupPhone" placeholder="+91 98765 43210"> 
 </div> 
 <div class="input-group"> 
 <label>Password</label> 
 <input type="password" id="signupPassword" placeholder="••••••••" required> 
 </div> 
 <div class="input-group"> 
 <label>Confirm Password</label> 
 <input type="password" id="signupConfirmPassword" placeholder="••••••••" required> 
 </div> 
 <button type="submit" class="submit-btn">Create Account</button> 
 </form> 
 <p class="switch-text">Already have an account? <a id="goToLoginLink">Login</a></p> 
 </div> 
 </div>

 <!-- 3. WHITE EMPTY CONTENT CONTAINER -->
 <div class="app-content hidden" id="mainAppContent"></div>

 <!-- 4. BOTTOM NAVIGATION BAR -->
 <div class="bottom-nav hidden" id="appBottomNav">
 <button class="nav-item active" onclick="handleNavClick('home')">
 <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
 <span>Home</span>
 </button>
 <button class="nav-item" onclick="handleNavClick('category')">
 <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg>
 <span>Category</span>
 </button>
 <button class="nav-item unique-cart" onclick="handleNavClick('cart')">
 <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
 </button>
 <button class="nav-item" onclick="handleNavClick('offers')">
 <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7c-.83 0-1.5-.67-1.5-1.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
 <span>Offers</span>
 </button>
 <button class="nav-item" onclick="handleNavClick('me')">
 <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
 <span>Me</span>
 </button>
 </div>

 <script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
 import { 
 getAuth, 
 createUserWithEmailAndPassword, 
 signInWithEmailAndPassword,
 GoogleAuthProvider,
 FacebookAuthProvider,
 signInWithPopup,
 onAuthStateChanged
 } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

 const firebaseConfig = {
 apiKey: "AIzaSyDiZSWon47tBdSIkUB3qCSsU19LN_FOBgg",
 authDomain: "swami-mobiles-29ee3.firebaseapp.com",
 projectId: "swami-mobiles-29ee3",
 storageBucket: "swami-mobiles-29ee3.firebasestorage.app",
 messagingSenderId: "497794164748",
 appId: "1:497794164748:web:fecc6f04615fa35a5f6629"
 };

 const app = initializeApp(firebaseConfig);
 const auth = getAuth(app);

 // DOM Elements
 const authContainer = document.getElementById('authContainer');
 const appHeader = document.getElementById('appHeader');
 const appBottomNav = document.getElementById('appBottomNav');
 const mainAppContent = document.getElementById('mainAppContent');

 function activateMainDashboard() {
 authContainer.classList.add('hidden'); 
 appHeader.classList.remove('hidden'); 
 appBottomNav.classList.remove('hidden'); 
 mainAppContent.classList.remove('hidden'); 
 mainAppContent.innerHTML = "<h2 style='text-align:center; padding-top:40px;'>Swami Mobiles Dashboard Active!</h2>"; 
 }

 // ऑटो लॉगिन चेक (State Monitor)
 onAuthStateChanged(auth, (user) => {
 if (user) { activateMainDashboard(); }
 });

 // Tab Switch Code
 window.switchTab = function(tab) {
 document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
 document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
 document.getElementById('loginTabBtn').classList.toggle('active', tab === 'login');
 document.getElementById('signupTabBtn').classList.toggle('active', tab === 'signup');
 }
 document.getElementById('loginTabBtn').addEventListener('click', () => switchTab('login'));
 document.getElementById('signupTabBtn').addEventListener('click', () => switchTab('signup'));
 document.getElementById('goToSignupLink').addEventListener('click', () => switchTab('signup'));
 document.getElementById('goToLoginLink').addEventListener('click', () => switchTab('login'));

 // Bottom Navigation Click Handling
 window.handleNavClick = function(page) {
 document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
 event.currentTarget.classList.add('active');
 mainAppContent.innerHTML = ""; // स्क्रीन को पूरा साफ/व्हाइट रखेगा
 }

 // 1. EMAIL SIGNUP
 document.getElementById('mainSignupForm').addEventListener('submit', (e) => {
 e.preventDefault();
 const email = document.getElementById('signupEmail').value;
 const password = document.getElementById('signupPassword').value;
 createUserWithEmailAndPassword(auth, email, password)
 .then(() => { activateMainDashboard(); })
 .catch((err) => alert("Signup Error: " + err.message));
 });

 // 2. EMAIL LOGIN (यह तुरंत बॉक्स को गायब कर देगा)
 document.getElementById('mainLoginForm').addEventListener('submit', (e) => {
 e.preventDefault();
 const email = document.getElementById('loginEmail').value;
 const password = document.getElementById('loginPassword').value;

 signInWithEmailAndPassword(auth, email, password)
 .then(() => { 
 activateMainDashboard(); 
 })
 .catch((err) => {
 alert("लॉगिन एरर संदेश:\n" + err.code + "\n" + err.message);
 });
 });

 // 3. SOCIAL LOGINS
 const googleProvider = new GoogleAuthProvider();
 document.querySelectorAll('.google-login-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 signInWithPopup(auth, googleProvider)
 .then(() => { activateMainDashboard(); })
 .catch((err) => alert("Google Login Error: " + err.message));
 });
 });
 </script>
</body> 
</html>
