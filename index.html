<!DOCTYPE html> 
<html lang="hi"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
<title>Swami Mobiles</title> 
<style> 
 * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; } 
 
 html, body { 
     height: 100%; 
     width: 100%; 
     overflow-x: hidden; /* लेफ्ट-राइट हिलना बिल्कुल बंद */
 } 

 body { 
     min-height: 100vh; 
     display: flex; 
     flex-direction: column; 
     align-items: center; 
     justify-content: center; 
     padding: 16px; 
     position: relative; 
     background: linear-gradient(160deg, #1b2a4a 0%, #1f4e5f 18%, #2a6b6b 35%, #d97a5e 60%, #e2654f 75%, #7a2d3a 100%); 
 } 

 body::before, body::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; } 
 body::before { width: 300px; height: 300px; background: rgba(255, 130, 90, 0.45); top: -50px; left: -50px; } 
 body::after { width: 300px; height: 300px; background: rgba(40, 180, 170, 0.4); bottom: -50px; right: -50px; } 
 
 /* Auth Container */
 .container { 
     position: relative; 
     z-index: 1; 
     width: 100%; 
     max-width: 360px; /* मोबाइल के लिए एकदम सही चौड़ाई */
     background: rgba(255, 255, 255, 0.10); 
     border: 1.5px solid rgba(255, 255, 255, 0.35); 
     border-radius: 22px; 
     backdrop-filter: blur(18px); 
     -webkit-backdrop-filter: blur(18px); 
     box-shadow: 0 25px 60px rgba(0,0,0,0.35); 
     padding: 30px 24px; 
     color: #fff; 
 } 

 .tabs { display: flex; gap: 28px; justify-content: center; margin-bottom: 24px; } 
 .tab-btn { background: none; border: none; font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.5); cursor: pointer; padding-bottom: 6px; transition: 0.25s; } 
 .tab-btn.active { color: #fff; font-weight: 600; border-bottom: 2px solid #fff; } 
 .toggle-method { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; } 
 .toggle-method button { padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; cursor: pointer; } 
 .toggle-method button.active { background: #fff; color: #2a6b6b; border-color: #fff; } 
 .input-group { margin-bottom: 20px; } 
 .input-group label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 6px; } 
 .input-group input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,0.55); padding: 6px 2px 8px; font-size: 15px; color: #fff; outline: none; } 
 .input-group input:focus { border-bottom-color: #fff; } 
 .options-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; margin-bottom: 20px; } 
 .options-row a { color: #fff; text-decoration: none; font-weight: 600; } 
 .checkbox-row { display: flex; align-items: center; gap: 6px; } 
 .submit-btn { width: 100%; padding: 12px 0; background: #fff; color: #2a4a4a; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; } 
 .switch-text { text-align: center; margin-top: 16px; font-size: 13.5px; } 
 .switch-text a { color: #fff; font-weight: 700; text-decoration: underline; cursor: pointer; } 
 .divider { display: flex; align-items: center; text-align: center; margin: 20px 0 14px; color: rgba(255,255,255,0.6); font-size: 12px; } 
 .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.3); } 
 .divider span { padding: 0 10px; } 
 .social-buttons { display: flex; gap: 12px; } 
 .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 0; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 12px; background: rgba(255,255,255,0.08); font-size: 13px; color: #fff; cursor: pointer; } 
 
 /* --- FIXED HEADER / SEARCH BAR --- */
 .main-header { 
     position: fixed; 
     top: 12px; 
     left: 0;
     width: 100%; 
     padding: 0 16px;
     z-index: 100; 
 }
 .search-box { 
     display: flex; 
     align-items: center; 
     background: rgba(255, 255, 255, 0.15); 
     border: 1px solid rgba(255, 255, 255, 0.25); 
     backdrop-filter: blur(20px); 
     -webkit-backdrop-filter: blur(20px); 
     border-radius: 30px; 
     padding: 8px 16px; 
     max-width: 360px;
     margin: 0 auto;
 }
 .search-box input { width: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; padding-left: 8px; }
 .search-box input::placeholder { color: rgba(255, 255, 255, 0.6); }
 .search-box svg { width: 18px; height: 18px; fill: rgba(255, 255, 255, 0.8); }

 /* --- MAIN CONTENT AREA (📱 FOR PRODUCT GRID) --- */
 .app-content { 
     position: relative; 
     z-index: 1; 
     width: 100%; 
     max-width: 360px; 
     min-height: 200px; 
     background: rgba(255, 255, 255, 0.95); 
     border-radius: 22px; 
     padding: 16px; 
     color: #333; 
     margin-top: 60px; 
     margin-bottom: 80px; 
 }

 /* Dynamic Live Product Cards Style */
 .product-card { display: flex; gap: 14px; background: #fff; padding: 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); align-items: center; text-align: left; border: 1px solid #eef2f1; }
 .product-card img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: #f9f9f9; }
 .product-details { flex: 1; }
 .p-title { font-size: 15px; font-weight: 700; color: #1b2a4a; margin-bottom: 4px; }
 .price-box { margin-bottom: 8px; }
 .before-p { font-size: 12px; color: #888; text-decoration: line-through; margin-right: 6px; }
 .after-p { font-size: 16px; font-weight: 800; color: #2a6b6b; }
 .buy-btn { background: #2a6b6b; color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 12px; cursor: pointer; }

 /* Order Modal styling */
 .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10005; }
 .modal-content { background: white; width: 100%; max-width: 320px; padding: 20px; border-radius: 20px; text-align: center; color: #333; }
 .modal-content h3 { margin-bottom: 12px; color: #1b2a4a; font-size: 18px; }
 .modal-content input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccd5d4; border-radius: 8px; outline: none; font-size: 14px; }

 /* --- 📌 STRICTLY FIXED BOTTOM NAVIGATION BAR --- */
 .bottom-nav { 
     position: fixed; 
     bottom: 0; 
     left: 0; 
     width: 100%; /* पूरी स्क्रीन कवर करेगा */
     background: rgba(20, 35, 55, 0.92); /* थोड़ा सॉलिड किया ताकि पीछे का कंटेंट न दिखे */
     border-top: 1px solid rgba(255, 255, 255, 0.15); 
     backdrop-filter: blur(25px); 
     -webkit-backdrop-filter: blur(25px); 
     display: flex; 
     justify-content: space-around; 
     align-items: center; 
     padding: 6px 10px 12px 10px; /* बॉटम पैडिंग सेफ रखने के लिए */
     box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4); 
     z-index: 9999; /* हमेशा सबसे ऊपर रहेगा */
 }
 .nav-item { 
     display: flex; 
     flex-direction: column; 
     align-items: center; 
     justify-content: center; 
     background: none; 
     border: none; 
     color: rgba(255, 255, 255, 0.6); 
     font-size: 10px; 
     cursor: pointer; 
     flex: 1; 
 }
 .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
 .nav-item.active { color: #fff; font-weight: 600; }
 
 /* Unique Floating Cart Button Fix */
 .nav-item.unique-cart { 
     position: relative; 
     top: -14px; 
     background: linear-gradient(135deg, #e2654f 0%, #d97a5e 100%); 
     border: 3px solid #1b2a4a; 
     width: 56px; 
     height: 56px; 
     flex: none; 
     border-radius: 50%; 
     color: #fff; 
     box-shadow: 0 4px 15px rgba(226, 101, 79, 0.4); 
 }
 .nav-item.unique-cart svg { width: 24px; height: 24px; margin: 0; }

 .hidden { display: none !important; } 
</style> 
</head> 
<body> 
 
 <header class="main-header hidden" id="appHeader">
 <div class="search-box">
 <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
 <input type="text" placeholder="Search mobile, accessories...">
 </div>
 </header>

 <div class="container" id="authContainer"> 
 <div class="tabs"> 
 <button class="tab-btn active" id="loginTabBtn">login</button> 
 <button class="tab-btn" id="signupTabBtn">register</button> 
 </div> 

 <div id="loginForm"> 
 <div class="toggle-method"> 
 <button class="active" id="loginEmailBtn">Email</button> 
 <button id="loginPhoneBtn">Phone</button> 
 </div> 
 <form id="mainLoginForm"> 
 <div class="input-group" id="loginEmailGroup"> 
 <label>Email</label> 
 <input type="email" id="loginEmail" placeholder="aapka@email.com" required> 
 </div> 
 <div class="input-group hidden" id="loginPhoneGroup"> 
 <label>Phone Number</label> 
 <input type="tel" id="loginPhone" placeholder="+91 98765 43210"> 
 </div> 
 <div class="input-group"> 
 <label>Password</label> 
 <input type="password" id="loginPassword" placeholder="••••••••" required> 
 </div> 
 <div class="options-row"> 
 <label class="checkbox-row"><input type="checkbox"> Remember me</label> 
 <a href="#" id="forgotPasswordLink">Forgot?</a> 
 </div> 
 <button type="submit" class="submit-btn">Login</button> 
 </form> 
 <div class="divider"><span>or continue with</span></div> 
 <div class="social-buttons"> 
 <button class="social-btn google-login-btn">Google</button> 
 <button class="social-btn facebook-login-btn">Facebook</button> 
 </div> 
 <p class="switch-text">Don't have an account? <a id="goToSignupLink">Register</a></p> 
 </div> 

 <div id="signupForm" class="hidden"> 
 <form id="mainSignupForm"> 
 <div class="input-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Aapka naam" required></div> 
 <div class="input-group"><label>Email</label><input type="email" id="signupEmail" placeholder="aapka@email.com" required></div> 
 <div class="input-group"><label>Password</label><input type="password" id="signupPassword" placeholder="••••••••" required></div> 
 <div class="input-group"><label>Confirm Password</label><input type="password" id="signupConfirmPassword" placeholder="••••••••" required></div> 
 <button type="submit" class="submit-btn">Create Account</button> 
 </form> 
 <p class="switch-text">Already have an account? <a id="goToLoginLink">Login</a></p> 
 </div> 
 </div>

 <div class="app-content hidden" id="mainAppContent"></div>

 <div id="userOrderModal" class="modal hidden">
     <div class="modal-content">
         <h3 id="modalProductTitle">Order Now</h3>
         <input type="text" id="orderCustName" placeholder="आपका नाम" required>
         <input type="tel" id="orderCustPhone" placeholder="मोबाइल नंबर" required>
         <button id="finalOrderSubmitBtn" style="width: 100%; background: #2a6b6b; color: white; border: none; padding: 10px; border-radius: 20px; font-weight: 700; cursor:pointer;">Order Confirm (COD)</button>
         <button id="closeModalBtn" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 8px; font-weight:600; cursor:pointer;">Cancel</button>
     </div>
 </div>

 <div class="bottom-nav hidden" id="appBottomNav">
 <button class="nav-item active" id="nav-home">
 <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
 <span>Home</span>
 </button>
 <button class="nav-item" id="nav-category">
 <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg>
 <span>Category</span>
 </button>
 <button class="nav-item unique-cart" id="nav-cart">
 <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
 </button>
 <button class="nav-item" id="nav-offers">
 <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7c-.83 0-1.5-.67-1.5-1.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
 <span>Offers</span>
 </button>
 <button class="nav-item" id="nav-me">
 <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
 <span>Me</span>
 </button>
 </div>

 <script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
 import { 
 getAuth, 
 createUserWithEmailAndPassword, 
 signInWithEmailAndPassword,
 GoogleAuthProvider,
 signInWithPopup,
 onAuthStateChanged
 } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
 
 // 📦 Realtime Database के फंक्शन्स इम्पोर्ट किए
 import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

 const firebaseConfig = {
     apiKey: "AIzaSyDiZSWon47tBdSIkUB3qCSsU19LN_FOBgg",
  authDomain: "swami-mobiles-29ee3.firebaseapp.com",
  projectId: "swami-mobiles-29ee3",
  storageBucket: "swami-mobiles-29ee3.firebasestorage.app",
  messagingSenderId: "497794164748",
  appId: "1:497794164748:web:fecc6f04615fa35a5f6629",
  measurementId: "G-GL9VG05PRN"
 };

 const app = initializeApp(firebaseConfig);
 const auth = getAuth(app);
 const database = getDatabase(app); // डेटाबेस इनिशियलाइज़ किया

 const authContainer = document.getElementById('authContainer');
 const appHeader = document.getElementById('appHeader');
 const appBottomNav = document.getElementById('appBottomNav');
 const mainAppContent = document.getElementById('mainAppContent');
 
 let currentSelectedProduct = null;

 function activateMainDashboard() {
 authContainer.classList.add('hidden'); 
 appHeader.classList.remove('hidden'); 
 appBottomNav.classList.remove('hidden'); 
 mainAppContent.classList.remove('hidden'); 
 loadLiveProducts(); // लॉगिन होते ही प्रोडक्ट्स लोड होंगे
 }

 onAuthStateChanged(auth, (user) => {
 if (user) { activateMainDashboard(); }
 });

 // 🔄 Firebase से रीयल-टाइम प्रोडक्ट्स लोड करने का लॉजिक
 function loadLiveProducts() {
     mainAppContent.innerHTML = "<p style='text-align:center;color:#666;'>स्टोर लोड हो रहा है...</p>";
     const productsRef = ref(database, 'products');
     onValue(productsRef, (snapshot) => {
         mainAppContent.innerHTML = "";
         if(snapshot.exists()) {
             snapshot.forEach((childSnapshot) => {
                 const product = childSnapshot.val();
                 mainAppContent.innerHTML += `
                     <div class="product-card">
                         <img src="${product.image}" alt="Mobile">
                         <div class="product-details">
                             <div class="p-title">${product.name}</div>
                             <div class="price-box">
                                 <span class="before-p">${product.beforePrice}</span>
                                 <span class="after-p">${product.afterPrice}</span>
                             </div>
                             <button class="buy-btn" data-name="${product.name}" data-price="${product.afterPrice}">Buy Now</button>
                         </div>
                     </div>`;
             });
             
             // सब Buy Now बटन पर क्लिक इवेंट जोड़ें
             document.querySelectorAll('.buy-btn').forEach(btn => {
                 btn.addEventListener('click', (e) => {
                     const name = e.target.getAttribute('data-name');
                     const price = e.target.getAttribute('data-price');
                     openOrderModal(name, price);
                 });
             });
         } else {
             mainAppContent.innerHTML = "<p style='text-align:center;color:#777;padding-top:30px;'>अभी स्टोर में कोई प्रोडक्ट नहीं है।</p>";
         }
     });
 }

 // 🛒 ऑर्डर मॉडल लॉजिक
 function openOrderModal(name, price) {
     currentSelectedProduct = { name, price };
     document.getElementById('modalProductTitle').innerText = name;
     document.getElementById('userOrderModal').classList.remove('hidden');
 }
 
 document.getElementById('closeModalBtn').addEventListener('click', () => {
     document.getElementById('userOrderModal').classList.add('hidden');
 });

 document.getElementById('finalOrderSubmitBtn').addEventListener('click', () => {
     const name = document.getElementById('orderCustName').value.trim();
     const phone = document.getElementById('orderCustPhone').value.trim();
     if(!name || !phone) { alert("कृपया नाम और नंबर दर्ज करें!"); return; }

     const ordersRef = ref(database, 'orders');
     const newOrderRef = push(ordersRef);
     set(newOrderRef, {
         productName: currentSelectedProduct.name,
         price: currentSelectedProduct.price,
         customerName: name,
         customerPhone: phone,
         timestamp: Date.now()
     }).then(() => {
         document.getElementById('userOrderModal').classList.add('hidden');
         document.getElementById('orderCustName').value = "";
         document.getElementById('orderCustPhone').value = "";
         alert("आपका ऑर्डर स्वामी मोबाइल्स को मिल गया है!");
     }).catch(err => alert("ऑर्डर एरर: " + err.message));
 });

 window.switchTab = function(tab) {
 document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
 document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
 document.getElementById('loginTabBtn').classList.toggle('active', tab === 'login');
 document.getElementById('signupTabBtn').classList.toggle('active', tab === 'signup');
 }
 document.getElementById('loginTabBtn').addEventListener('click', () => switchTab('login'));
 document.getElementById('signupTabBtn').addEventListener('click', () => switchTab('signup'));
 document.getElementById('goToSignupLink').addEventListener('click', () => switchTab('signup'));
 document.getElementById('goToLoginLink').addEventListener('click', () => switchTab('login'));

 // 📱 नेविगेशन बार क्लिक हैंडलर
 window.handleNavClick = function(page, elementId) {
     document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
     document.getElementById(elementId).classList.add('active');
     
     if(page === 'home') {
         loadLiveProducts();
     } else {
         mainAppContent.innerHTML = "<h3 style='padding-top:40px; text-align:center; color:#333;'>" + page.toUpperCase() + " Content Coming Soon...</h3>";
     }
 }
 
 document.getElementById('nav-home').addEventListener('click', () => handleNavClick('home', 'nav-home'));
 document.getElementById('nav-category').addEventListener('click', () => handleNavClick('category', 'nav-category'));
 document.getElementById('nav-cart').addEventListener('click', () => handleNavClick('cart', 'nav-cart'));
 document.getElementById('nav-offers').addEventListener('click', () => handleNavClick('offers', 'nav-offers'));
 document.getElementById('nav-me').addEventListener('click', () => handleNavClick('me', 'nav-me'));

 // SIGNUP
 document.getElementById('mainSignupForm').addEventListener('submit', (e) => {
 e.preventDefault();
 const email = document.getElementById('signupEmail').value;
 const password = document.getElementById('signupPassword').value;
 createUserWithEmailAndPassword(auth, email, password)
 .then(() => { activateMainDashboard(); })
 .catch((err) => alert("Signup Error: " + err.message));
 });

 // LOGIN
