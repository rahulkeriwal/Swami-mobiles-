<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swami Mobiles - Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f4f7f6; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #1b2a4a 0%, #2a6b6b 100%); color: white; padding: 20px; text-align: center; font-weight: 700; font-size: 22px; }
        .store-container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* 📱 Premium Product Grid/Cards */
        .product-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 15px; align-items: center; }
        .product-card img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; background: #fafafa; }
        .product-details { flex: 1; }
        .p-title { font-size: 16px; font-weight: 700; color: #1b2a4a; margin-bottom: 5px; }
        .price-box { margin-bottom: 10px; }
        .before-p { font-size: 13px; color: #888; text-decoration: line-through; margin-right: 8px; }
        .after-p { font-size: 17px; font-weight: 800; color: #2a6b6b; }
        .buy-btn { background: #2a6b6b; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 13px; cursor: pointer; }
        
        /* Modal for Order Placement */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10000; }
        .modal-content { background: white; width: 100%; max-width: 360px; padding: 25px; border-radius: 24px; }
        .modal-content h3 { margin-bottom: 15px; color: #1b2a4a; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccd5d4; border-radius: 10px; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">स्वामी मोबाइल्स स्टोर</div>

    <div class="store-container" id="productGrid">
        <p style="text-align: center; color: #777; margin-top: 40px;">स्टोर लोड हो रहा है...</p>
    </div>

    <div id="orderModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalProdTitle">Order Details</h3>
            <input type="text" id="custName" placeholder="आपका पूरा नाम" required>
            <input type="tel" id="custPhone" placeholder="मोबाइल नंबर" required>
            <button onclick="submitOrderLive()" style="width: 100%; background: #2a6b6b; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: 700;">ऑर्डर कन्फर्म करें (COD)</button>
            <button onclick="closeModal()" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 10px; font-weight: 600;">रद्द करें</button>
        </div>
    </div>

    <script>
        // 🛠️ दोनों फाइलों में सेम FIREBASE कॉन्फ़िगरेशन होना चाहिए:
        const firebaseConfig = {
            apiKey: "AIzaSyDiZSWon47tBdSIkUB3qCSsU19LN_FOBgg",
  authDomain: "swami-mobiles-29ee3.firebaseapp.com",
  projectId: "swami-mobiles-29ee3",
  storageBucket: "swami-mobiles-29ee3.firebasestorage.app",
  messagingSenderId: "497794164748",
  appId: "1:497794164748:web:fecc6f04615fa35a5f6629",
  measurementId: "G-GL9VG05PRN"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let selectedProduct = null;

        // 🔄 Firebase से रीयल-टाइम में प्रोडक्ट लोड करना
        database.ref('products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            if(snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const product = childSnapshot.val();
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image}" alt="Mobile">
                            <div class="product-details">
                                <div class="p-title">${product.name}</div>
                                <div class="price-box">
                                    <span class="before-p">${product.beforePrice}</span>
                                    <span class="after-p">${product.afterPrice}</span>
                                </div>
                                <button class="buy-btn" onclick="openOrderModal('${product.name}', '${product.afterPrice}')">Buy Now</button>
                            </div>
                        </div>`;
                });
            } else {
                grid.innerHTML = `<p style="text-align: center; color: #777; margin-top: 40px;">अभी स्टोर में कोई प्रोडक्ट नहीं है।</p>`;
            }
        });

        function openOrderModal(name, price) {
            selectedProduct = { name, price };
            document.getElementById('modalProdTitle').innerText = name;
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        // 📤 ऑर्डर सीधा एडमिन पैनल के लाइव डेटाबेस पर भेजने का फंक्शन
        function submitOrderLive() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();

            if(!name || !phone) return;

            database.ref('orders').push({
                productName: selectedProduct.name,
                price: selectedProduct.price,
                customerName: name,
                customerPhone: phone,
                timestamp: Date.now()
            }).then(() => {
                closeModal();
                document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = "";
                alert("आपका ऑर्डर स्वामी मोबाइल्स तक पहुँच गया है!");
            });
        }
    </script>
</body>
</html>
