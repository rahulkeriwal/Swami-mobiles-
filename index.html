    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background: #f4f7f6;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            position: relative;
            background: linear-gradient(160deg, #1b2a4a 0%, #1f4e5f 18%, #2a6b6b 35%, #d97a5e 60%, #e2654f 75%, #7a2d3a 100%);
            background-attachment: fixed;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: rgba(255, 130, 90, 0.45);
            top: -50px;
            left: -50px;
        }

        body::after {
            width: 300px;
            height: 300px;
            background: rgba(40, 180, 170, 0.4);
            bottom: -50px;
            right: -50px;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.10);
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            border-radius: 22px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            padding: 30px 24px;
            color: #fff;
        }

        .tabs {
            display: flex;
            gap: 28px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 22px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding-bottom: 6px;
            transition: 0.25s;
        }

        .tab-btn.active {
            color: #fff;
            font-weight: 600;
            border-bottom: 2px solid #fff;
        }

        .toggle-method {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .toggle-method button {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-method button.active {
            background: #fff;
            color: #2a6b6b;
            border-color: #fff;
        }
