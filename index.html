<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
<title>Swami Mobiles</title> 

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style> 
 * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; } 
 html, body { height: 100%; width: 100%; overflow-x: hidden; background: #f4f7f6; } 
 body { 
     min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 12px; position: relative; 
     background: linear-gradient(160deg, #1b2a4a 0%, #1f4e5f 18%, #2a6b6b 35%, #d97a5e 60%, #e2654f 75%, #7a2d3a 100%); 
     background-attachment: fixed;
 } 
 body::before, body::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; } 
 body::before { width: 300px; height: 300px; background: rgba(255, 130, 90, 0.45); top: -50px; left: -50px; } 
 body::after { width: 300px; height: 300px; background: rgba(40, 180, 170, 0.4); bottom: -50px; right: -50px; } 
 
 .container { 
     position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; width: 100%; max-width: 360px; background: rgba(255, 255, 255, 0.10); 
     border: 1.5px solid rgba(255, 255, 255, 0.35); border-radius: 22px; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); 
     box-shadow: 0 25px 60px rgba(0,0,0,0.35); padding: 30px 24px; color: #fff; 
 } 
 .tabs { display: flex; gap: 28px; justify-content: center; margin-bottom: 24px; } 
 .tab-btn { background: none; border: none; font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.5); cursor: pointer; padding-bottom: 6px; transition: 0.25s; } 
 .tab-btn.active { color: #fff; font-weight: 600; border-bottom: 2px solid #fff; } 
 .toggle-method { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; } 
 .toggle-method button { padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; cursor: pointer; } 
 .toggle-method button.active { background: #fff; color: #2a6b6b; border-color: #fff; } 
 .input-group { margin-bottom: 20px; } 
 .input-group label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 6px; } 
 .input-group input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,0.55); padding: 6px 2px 8px; font-size: 15px; color: #fff; outline: none; } 
 .input-group input:focus { border-bottom-color: #fff; } 
 .options-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; margin-bottom: 20px; } 
 .options-row a { color: #fff; text-decoration: none; font-weight: 600; } 
 .checkbox-row { display: flex; align-items: center; gap: 6px; } 
 .submit-btn { width: 100%; padding: 12px 0; background: #fff; color: #2a4a4a; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; } 
 .switch-text { text-align: center; margin-top: 16px; font-size: 13.5px; } 
 .switch-text a { color: #fff; font-weight: 700; text-decoration: underline; cursor: pointer; } 
 .divider { display: flex; align-items: center; text-align: center; margin: 20px 0 14px; color: rgba(255,255,255,0.6); font-size: 12px; } 
 .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.3); } 
 .divider span { padding: 0 10px; } 
 .social-buttons { display: flex; gap: 12px; } 
 .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 0; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 12px; background: rgba(255,255,255,0.08); font-size: 13px; color: #fff; cursor: pointer; } 
 
 .main-header { position: fixed; top: 0; left: 0; width: 100%; padding: 12px 16px; z-index: 100; background: rgba(27, 42, 74, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
 .search-box { display: flex; align-items: center; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 30px; padding: 8px 16px; max-width: 360px; margin: 0 auto; }
 .search-box input { width: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; padding-left: 8px; }
 .search-box input::placeholder { color: rgba(255, 255, 255, 0.6); }

 .category-nav-scroll { display: flex; gap: 8px; overflow-x: auto; width: 100%; max-width: 380px; margin: 10px auto 5px auto; padding: 4px 2px; scrollbar-width: none; }
 .category-nav-scroll::-webkit-scrollbar { display: none; }
 .cat-pill { flex: 0 0 auto; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
 .cat-pill.active { background: #fff; color: #1b2a4a; font-weight: 700; }

 .app-content { position: relative; z-index: 1; width: 100%; max-width: 380px; background: transparent; padding: 4px; color: #333; margin-bottom: 90px; }
 .user-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; text-align: left; }
 .product-box-card { background: rgba(255, 255, 255, 0.96); border-radius: 10px; padding: 6px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
 .product-box-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; background: #fafafa; margin-bottom: 4px; }
 .p-box-title { font-size: 10.5px; font-weight: 700; color: #1b2a4a; margin-bottom: 2px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 26px; }
 .price-box-row { margin-bottom: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 2px; }
 .before-p-box { font-size: 8.5px; text-decoration: line-through; color: #888; }
 .after-p-box { font-size: 11px; font-weight: 800; color: #d97a5e; }

 .cart-list { display: flex; flex-direction: column; gap: 10px; width: 100%; padding: 5px 0; }
 .cart-item { background: rgba(255, 255, 255, 0.95); border-radius: 12px; padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
 .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #eee; }
 .cart-item-details { flex: 1; text-align: left; }
 .cart-item-title { font-size: 13px; font-weight: 700; color: #1b2a4a; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
 .cart-item-price { font-size: 13px; font-weight: 800; color: #d97a5e; margin-top: 2px; }
 .cart-remove-btn { background: none; border: none; color: #e2654f; font-size: 12px; font-weight: 700; cursor: pointer; padding: 5px; }
 
 .cart-summary { background: rgba(27, 42, 74, 0.9); border-radius: 16px; padding: 16px; color: #fff; margin-top: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.2); }
 .summary-row { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 8px; }
 .checkout-btn { width: 100%; background: #fff; color: #1b2a4a; border: none; padding: 12px; border-radius: 25px; font-weight: 800; font-size: 14px; cursor: pointer; text-align: center; box-shadow: 0 4px 12px rgba(255,255,255,0.2); transition: 0.2s; }

 .profile-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 22px 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-top: 10px; }
 .profile-img-container { position: relative; width: 100px; height: 100px; margin: 0 auto 12px auto; }
 .profile-avatar { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid #1b2a4a; background: #e0e6ed; cursor: pointer; }
 .avatar-upload-label { position: absolute; bottom: 2px; right: 2px; background: #2a6b6b; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
 .profile-name-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px; }
 .profile-name { font-size: 19px; font-weight: 800; color: #1b2a4a; }
 .edit-name-pencil { font-size: 15px; cursor: pointer; color: #666; }
 .profile-email { font-size: 12.5px; color: #666; margin-bottom: 12px; }
 
 .profile-info-box { background: #f8fafc; border-radius: 12px; padding: 10px 14px; text-align: left; margin-bottom: 14px; border: 1px solid #e2e8f0; }
 .info-box-title { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
 .info-box-text { font-size: 13.5px; font-weight: 600; color: #334155; }
 .info-edit-btn { font-size: 13px; cursor: pointer; color: #2a6b6b; font-weight: bold; }

 .profile-action-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
 .p-action-btn { background: #e2e8f0; border: none; padding: 10px; border-radius: 12px; font-size: 12.5px; font-weight: 700; color: #1b2a4a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
 .p-action-btn:active { background: #cbd5e1; }

 .social-media-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #e2e8f0; text-align: center; }
 .social-media-footer p { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 10px; }
 .social-icons-row { display: flex; justify-content: center; gap: 20px; }
 .social-icon-link { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; text-decoration: none; transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
 .social-icon-link:active { transform: scale(0.9); }
 .social-icon-link svg { width: 22px; height: 22px; }

 .faq-section { text-align: left; margin-top: 15px; border-top: 1px solid #e2e8f0; padding-top: 15px; }
 .faq-section h4 { font-size: 14px; color: #1b2a4a; margin-bottom: 10px; font-weight: 800; }
 .faq-item { border-bottom: 1px solid #f1f5f9; padding: 8px 0; cursor: pointer; }
 .faq-question { font-size: 12.5px; font-weight: 700; color: #334155; display: flex; justify-content: space-between; }
 .faq-answer { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.4; display: none; }

 .category-page-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; padding: 10px 0; }
 .category-card-btn { background: rgba(255, 255, 255, 0.15); border: 1.5px solid rgba(255, 255, 255, 0.25); border-radius: 16px; padding: 20px 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
 .category-card-btn:active { transform: scale(0.96); background: #fff; color: #1b2a4a; }

 .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10005; }
 .modal-content { background: white; width: 100%; max-width: 340px; padding: 20px; border-radius: 20px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
 input[type="text"], input[type="tel"], input[type="password"] { width: 100%; padding: 10px 14px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; outline: none; font-size: 14px; color: #333; }
 
 #modalProductImg { width: 100%; max-height: 190px; object-fit: contain; border-radius: 12px; margin-bottom: 12px; background: #f9f9f9; }
 #modalProductTitleDetail { font-size: 17px; font-weight: 700; color: #1b2a4a; margin-bottom: 6px; text-align: left; }
 #modalProductDesc { font-size: 12.5px; color: #666; text-align: left; margin-bottom: 12px; max-height: 60px; overflow-y: auto; line-height: 1.4; }
 .modal-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; justify-content: flex-start; }
 .modal-before-p { font-size: 13px; text-decoration: line-through; color: #999; }
 .modal-after-p { font-size: 18px; font-weight: 800; color: #d97a5e; }
 .add-cart-btn { width: 100%; background: #2a6b6b; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: 700; font-size: 15px; cursor: pointer; box-shadow: 0 4px 12px rgba(42, 107, 107, 0.3); margin-bottom: 8px; }
 .close-txt-btn { width: 100%; background: transparent; color: #e2654f; border: none; font-weight: 600; cursor: pointer; font-size: 13px; padding: 4px 0; }

 .toast-cylinder { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(30px); background: rgba(20, 35, 55, 0.95); color: #fff; padding: 10px 22px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 25px rgba(0,0,0,0.35); border: 1px solid rgba(255, 255, 255, 0.2); z-index: 10010; opacity: 0; pointer-events: none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease; }
 .toast-cylinder.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 .toast-success-icon { background: #28b4a2; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #fff; }

 .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(20, 35, 55, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: center; padding: 6px 10px 12px 10px; box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4); z-index: 9999; }
 .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: rgba(255, 255, 255, 0.6); font-size: 10px; cursor: pointer; flex: 1; }
 .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
 .nav-item.active { color: #fff; font-weight: 600; }
 .nav-item.unique-cart { position: relative; top: -14px; background: linear-gradient(135deg, #e2654f 0%, #d97a5e 100%); border: 3px solid #1b2a4a; width: 56px; height: 56px; flex: none; border-radius: 50%; color: #fff; box-shadow: 0 4px 15px rgba(226, 101, 79, 0.4); }
 .nav-item.unique-cart svg { width: 24px; height: 24px; margin: 0; }

 .logout-btn { background: #e2654f; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 5px; width: 100%; }
 .hidden { display: none !important; } 
</style> 
</head>
<body> 
 <header class="main-header hidden" id="appHeader">
     <div class="search-box">
         <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#fff;margin-right:5px;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
         <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search mobile, accessories...">
     </div>
 </header>

 <div class="container" id="authContainer"> 
     <div class="tabs"> 
         <button class="tab-btn active" onclick="switchTab('login')" id="loginTabBtn">Login</button> 
         <button class="tab-btn" onclick="switchTab('signup')" id="signupTabBtn">Register</button> 
     </div> 

     <div id="loginForm"> 
         <div class="toggle-method"> 
             <button class="active" id="loginEmailBtn">Email</button> 
             <button id="loginPhoneBtn">Phone</button> 
         </div> 
         <form id="mainLoginForm" onsubmit="event.preventDefault(); handleLogin();"> 
             <div class="input-group" id="loginEmailGroup"> 
                 <label>Email</label> 
                 <input type="email" id="loginEmail" placeholder="your@email.com" required> 
             </div> 
             <div class="input-group hidden" id="loginPhoneGroup"> 
                 <label>Phone Number</label> 
                 <input type="tel" id="loginPhone" placeholder="+91 98765 43210"> 
             </div> 
             <div class="input-group"> 
                 <label>Password</label> 
                 <input type="password" id="loginPassword" placeholder="••••••••" required> 
             </div> 
             <div class="options-row"> 
                 <label class="checkbox-row"><input type="checkbox"> Remember me</label> 
                 <a href="#">Forgot?</a> 
             </div> 
             <button type="submit" class="submit-btn">Login</button> 
         </form> 
         <div class="divider"><span>or continue with</span></div> 
         <div class="social-buttons"> 
             <button class="social-btn" onclick="handleGoogleLogin()">Google</button> 
             <button class="social-btn">Facebook</button> 
         </div> 
         <p class="switch-text">Don't have an account? <a onclick="switchTab('signup')">Register</a></p> 
     </div> 

     <div id="signupForm" class="hidden"> 
         <form id="mainSignupForm" onsubmit="event.preventDefault(); handleSignup();"> 
             <div class="input-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your full name" required></div> 
             <div class="input-group"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com" required></div> 
             <div class="input-group"><label>Password</label><input type="password" id="signupPassword" placeholder="••••••••" required></div> 
             <div class="input-group"><label>Confirm Password</label><input type="password" id="signupConfirmPassword" placeholder="••••••••" required></div> 
             <button type="submit" class="submit-btn">Create Account</button> 
         </form> 
         <p class="switch-text">Already have an account? <a onclick="switchTab('login')">Login</a></p> 
     </div> 
 </div>

 <div class="app-content hidden" id="mainAppContent"></div>

 <div id="productDetailModal" class="modal hidden">
     <div class="modal-content">
         <img id="modalProductImg" src="" alt="Product">
         <h3 id="modalProductTitleDetail">Product Title</h3>
         <p id="modalProductDesc">Product description...</p>
         <div class="modal-price-row">
             <span id="modalBeforePrice" class="modal-before-p"></span>
             <span id="modalAfterPrice" class="modal-after-p"></span>
         </div>
         <button class="add-cart-btn" onclick="addToCartLive()">Add to Cart 🛒</button>
         <button class="close-txt-btn" onclick="closeDetailModal()">Close</button>
     </div>
 </div>

 <div id="userOrderModal" class="modal hidden">
     <div class="modal-content">
         <h3>Checkout Details</h3>
         <p style="font-size:13px; color:#666; margin-bottom:12px;">Complete your details to place the order.</p>
         <input type="text" id="orderCustName" placeholder="Your Name" required>
         <input type="tel" id="orderCustPhone" placeholder="Mobile Number" required>
         <button onclick="submitOrderLive()" style="width: 100%; background: #2a6b6b; color: white; border: none; padding: 10px; border-radius: 20px; font-weight: 700; cursor:pointer;">Confirm Order (COD)</button>
         <button onclick="closeOrderModal()" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 8px; font-weight:600; cursor:pointer;">Cancel</button>
     </div>
 </div>

 <div id="editNameModal" class="modal hidden">
     <div class="modal-content">
         <h3 style="margin-bottom:12px; color:#1b2a4a;">Edit Profile Name</h3>
         <input type="text" id="newProfileNameInput" placeholder="Enter your new name">
         <button onclick="saveProfileNameLive()" style="width: 100%; background: #2a6b6b; color: white; border: none; padding: 10px; border-radius: 20px; font-weight: 700; cursor:pointer;">Save Name</button>
         <button onclick="closeEditNameModal()" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 8px; font-weight:600; cursor:pointer;">Cancel</button>
     </div>
 </div>

 <div id="editAddressModal" class="modal hidden">
     <div class="modal-content">
         <h3 style="margin-bottom:12px; color:#1b2a4a;">Update Address</h3>
         <input type="text" id="newAddressInput" placeholder="House No, Street, City, Pincode...">
         <button onclick="saveProfileAddressLive()" style="width: 100%; background: #2a6b6b; color: white; border: none; padding: 10px; border-radius: 20px; font-weight: 700; cursor:pointer;">Save Address</button>
         <button onclick="closeEditAddressModal()" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 8px; font-weight:600; cursor:pointer;">Cancel</button>
     </div>
 </div>

 <div id="changePasswordModal" class="modal hidden">
     <div class="modal-content">
         <h3 style="margin-bottom:12px; color:#1b2a4a;">Change Password</h3>
         <input type="password" id="newPasswordInput" placeholder="Enter new password">
         <button onclick="saveNewPasswordLive()" style="width: 100%; background: #2a6b6b; color: white; border: none; padding: 10px; border-radius: 20px; font-weight: 700; cursor:pointer;">Update Password</button>
         <button onclick="closeChangePasswordModal()" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 8px; font-weight:600; cursor:pointer;">Cancel</button>
     </div>
 </div>

 <div id="cartToast" class="toast-cylinder">
     <span class="toast-success-icon">✓</span>
     <span id="toastMessage">Product added to cart</span>
 </div>

 <div class="bottom-nav hidden" id="appBottomNav">
     <button class="nav-item active" id="nav-home" onclick="handleNavClick('home', 'nav-home')">
         <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
         <span>Home</span>
     </button>
     <button class="nav-item" id="nav-category" onclick="handleNavClick('category', 'nav-category')">
         <svg viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6h-5v6zm0-13v6h5V5h-5z"/></svg>
         <span>Category</span>
     </button>
     <button class="nav-item unique-cart" id="nav-cart" onclick="handleNavClick('cart', 'nav-cart')">

  <script>
 const firebaseConfig = {
     apiKey: "AIzaSyDiZSWon47tBdSIkUB3qCSsU19LN_FOBgg",
     authDomain: "swami-mobiles-29ee3.firebaseapp.com",
     projectId: "swami-mobiles-29ee3",
     storageBucket: "swami-mobiles-29ee3.firebasestorage.app",
     messagingSenderId: "497794164748",
     appId: "1:497794164748:web:fecc6f04615fa35a5f6629",
     databaseURL: "https://swami-mobiles-29ee3-default-rtdb.firebaseio.com/" 
 };

 firebase.initializeApp(firebaseConfig);
 const auth = firebase.auth();
 const database = firebase.database();

 const authContainer = document.getElementById('authContainer');

 const appBottomNav = document.getElementById('appBottomNav');
 const mainAppContent = document.getElementById('mainAppContent');
 
 let currentSelectedProduct = null;

 let userCartArray = JSON.parse(localStorage.getItem('swami_cart')) || [];

 // LINKS CONFIGURATION SECTION (PUT YOUR LINKS HERE)
 const YOUTUBE_LINK = "#";   
 const WHATSAPP_LINK = "#";  
 const INSTAGRAM_LINK = "#"; 

 auth.onAuthStateChanged((user) => {
     if (user) { 
         database.ref('users/' + user.uid).once('value').then((snapshot) => {
             if (snapshot.exists()) {
                 const userData = snapshot.val();
                 userCustomName = userData.name || "Swami User";
                 userCustomAddress = userData.address || "Click edit to add your delivery address";
             } else if (user.displayName) {
                 userCustomName = user.displayName;
             } else {
                 userCustomName = "Swami User";
             }
             activateMainDashboard(); 
         }).catch(() => {
             userCustomName = "Swami User";
             activateMainDashboard();
         });
     } else {
         deactivateMainDashboard();
     }
 });

 function activateMainDashboard() {
     authContainer.classList.add('hidden'); 
     appBottomNav.classList.remove('hidden'); 
     mainAppContent.classList.remove('hidden'); 
     toggleHeaderVisibility();
     loadLiveProducts(); 
 }

 function deactivateMainDashboard() {
     authContainer.remove('hidden'); 
     appHeader.classList.add('hidden'); 
     appBottomNav.classList.add('hidden'); 
     mainAppContent.classList.add('hidden'); 
 }

 function toggleHeaderVisibility() {
     if (currentTab === "home") {
         appHeader.classList.remove('hidden'); 
         mainAppContent.style.marginTop = "65px"; 
     } else {
         appHeader.classList.add('hidden'); 
         mainAppContent.style.marginTop = "15px"; 
     }
 }

 window.switchTab = function(tab) {
     document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
     document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
     document.getElementById('loginTabBtn').classList.toggle('active', tab === 'login');
     document.getElementById('signupTabBtn').classList.toggle('active', tab === 'signup');
 }

 window.handleLogin = function() {
     const email = document.getElementById('loginEmail').value.trim();
     const password = document.getElementById('loginPassword').value;
     auth.signInWithEmailAndPassword(email, password).catch((err) => showCustomToastLive("Error: " + err.message));
 }

 window.handleSignup = function() {
     const fullName = document.getElementById('signupName').value.trim();
     const email = document.getElementById('signupEmail').value.trim();
     const password = document.getElementById('signupPassword').value;
     const confirmPassword = document.getElementById('signupConfirmPassword').value;
     
     if (!fullName) { showCustomToastLive("Please enter your name!"); return; }
     if (password !== confirmPassword) { showCustomToastLive("Passwords do not match!"); return; }
     
     auth.createUserWithEmailAndPassword(email, password).then((result) => {
         return database.ref('users/' + result.user.uid).set({
             name: fullName,
             email: email,
             address: ""
         });
     }).catch((err) => showCustomToastLive("Error: " + err.message));
 }

 window.handleGoogleLogin = function() {
     const provider = new firebase.auth.GoogleAuthProvider();
     auth.signInWithPopup(provider).then((result) => {
         if(result.user) {
             database.ref('users/' + result.user.uid).update({
                 name: result.user.displayName,
                 email: result.user.email
             });
         }
     }).catch((err) => showCustomToastLive("Google Sign-In Error"));
 }

 window.handleLogout = function() {
     auth.signOut().then(() => { 
         localStorage.removeItem('swami_cart'); 
         userCartArray = [];
         showCustomToastLive("Successfully Logged Out!"); 
     });
 }

 function loadLiveProducts() {
     mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:20px;'>Loading Store...</p>";
     database.ref('products').on('value', (snapshot) => {
         allProductsArray = [];
         if(snapshot.exists()) {
             snapshot.forEach((childSnapshot) => {
                 let data = childSnapshot.val();
                 data.key = childSnapshot.key; 
                 allProductsArray.push(data);
             });
         }
         renderCurrentTab(); 
     });
 }

 function renderUserProductsGrid(productsToRender) {
     mainAppContent.innerHTML = "";
     let navHTML = `
         <div class="category-nav-scroll">
             <button class="cat-pill ${activeCategory==='All'?'active':''}" onclick="filterBySpecificCategory('All')">✨ All Products</button>
             <button class="cat-pill ${activeCategory==='iphone'?'active':''}" onclick="filterBySpecificCategory('iphone')">🍏 iPhone</button>
             <button class="cat-pill ${activeCategory==='samsung'?'active':''}" onclick="filterBySpecificCategory('samsung')">📱 Samsung</button>
             <button class="cat-pill ${activeCategory==='oneplus'?'active':''}" onclick="filterBySpecificCategory('oneplus')">🔴 OnePlus</button>
             <button class="cat-pill ${activeCategory==='vivo'?'active':''}" onclick="filterBySpecificCategory('vivo')">💎 Vivo</button>
             <button class="cat-pill ${activeCategory==='oppo'?'active':''}" onclick="filterBySpecificCategory('oppo')">✨ Oppo</button>
             <button class="cat-pill ${activeCategory==='realme'?'active':''}" onclick="filterBySpecificCategory('realme')">💛 Realme</button>
             <button class="cat-pill ${activeCategory==='xiaomi'?'active':''}" onclick="filterBySpecificCategory('xiaomi')">🍊 Redmi</button>
             <button class="cat-pill ${activeCategory==='charger'?'active':''}" onclick="filterBySpecificCategory('charger')">🔌 Chargers</button>
         </div>
     `;

     if(productsToRender.length > 0) {
         let gridHTML = '<div class="user-grid">';
         productsToRender.forEach((product) => {
             let safeName = (product.name || '').replace(/'/g, "\\'");
             let safeDesc = (product.description || 'No description available.').replace(/'/g, "\\'").replace(/\n/g, " ");
             let safeImg = product.image || 'https://via.placeholder.com/150';

             gridHTML += `
                 <div class="product-box-card" onclick="openDetailModal('${product.key}', '${safeName}', '${product.beforePrice}', '${product.afterPrice}', '${safeImg}', '${safeDesc}')">
                     <img src="${safeImg}" alt="Product">
                     <div>
                         <div class="p-box-title">${product.name}</div>
                         <div class="price-box-row">
                             <span class="before-p-box">${product.beforePrice}</span>
                             <span class="after-p-box">${product.afterPrice}</span>
                         </div>
                     </div>
                 </div>`;
         });
         gridHTML += '</div>';
         mainAppContent.innerHTML = navHTML + gridHTML;
     } else {
         mainAppContent.innerHTML = navHTML + "<p style='text-align:center;color:#fff;padding:40px 10px;'>No products found in this category.</p>";
     }
 }

 let currentTab = "home";
 window.handleNavClick = function(tabName, navId) {
     document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
     document.getElementById(navId).classList.add('active');
     currentTab = tabName;
     toggleHeaderVisibility(); 
     renderCurrentTab();
 }

 function renderCurrentTab() {
     if (currentTab === "home") {
         if(activeCategory === "All") { renderUserProductsGrid(allProductsArray); } 
         else { filterBySpecificCategory(activeCategory); }
     } else if (currentTab === "category") {
         renderCategoryGridPage();
     } else if (currentTab === "cart") {
         renderCartItemsPage(); 
     } else if (currentTab === "offers") {
         mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:40px 10px;'>🔥 Mega Sale Deals Coming Soon!</p>";
     } else if (currentTab === "me") {
         renderMeProfilePage();
     }
 }

 window.toggleFaq = function(element) {
     let answer = element.querySelector('.faq-answer');
     let arrow = element.querySelector('.faq-question span:last-child');
     if(answer.style.display === "block") { answer.style.display = "none"; arrow.innerText = "▼"; } 
     else { answer.style.display = "block"; arrow.innerText = "▲"; }
 }

 window.triggerNativeShare = function() {
     let shareData = {
         title: 'Swami Mobiles',
         text: 'Check out original mobile components and premium accessories at unbeatable wholesale prices on the Swami Mobiles store!',
         url: window.location.href
     };
     if (navigator.share) { navigator.share(shareData).catch(() => {}); } 
     else { navigator.clipboard.writeText(shareData.text + " " + shareData.url).then(() => { showCustomToastLive("Share link copied!"); }); }
 }

 window.openEditNameModal = function() { document.getElementById('newProfileNameInput').value = userCustomName; document.getElementById('editNameModal').classList.remove('hidden'); }
 window.closeEditNameModal = function() { document.getElementById('editNameModal').classList.add('hidden'); }
 window.saveProfileNameLive = function() {
     let updatedName = document.getElementById('newProfileNameInput').value.trim();
     let user = auth.currentUser;
     if(updatedName && user) {
         database.ref('users/' + user.uid).update({ name: updatedName }).then(() => {
             userCustomName = updatedName; document.getElementById('displayProfileName').innerText = updatedName; closeEditNameModal(); showCustomToastLive("Name updated!");
         });
     }
 }
 window.openEditAddressModal = function() { document.getElementById('newAddressInput').value = (userCustomAddress.includes("Click edit")) ? "" : userCustomAddress; document.getElementById('editAddressModal').classList.remove('hidden'); }
 window.closeEditAddressModal = function() { document.getElementById('editAddressModal').classList.add('hidden'); }
 window.saveProfileAddressLive = function() {
     let updatedAddress = document.getElementById('newAddressInput').value.trim();
     let user = auth.currentUser;
     if(updatedAddress && user) {
         database.ref('users/' + user.uid).update({ address: updatedAddress }).then(() => {
             userCustomAddress = updatedAddress; document.getElementById('displayProfileAddress').innerText = updatedAddress; closeEditAddressModal(); showCustomToastLive("Address updated!");
         });
     }
 }
 window.openChangePasswordModal = function() { document.getElementById('newPasswordInput').value = ""; document.getElementById('changePasswordModal').classList.remove('hidden'); }
 window.closeChangePasswordModal = function() { document.getElementById('changePasswordModal').classList.add('hidden'); }
 window.saveNewPasswordLive = function() {
     let newPassword = document.getElementById('newPasswordInput').value; let user = auth.currentUser;
     if(!newPassword || newPassword.length < 6) { showCustomToastLive("Password too short!"); return; }
     if(user) { user.updatePassword(newPassword).then(() => { closeChangePasswordModal(); showCustomToastLive("Password updated!"); }); }
 }
 window.triggerAvatarUpload = function() { document.getElementById('hiddenAvatarInput').click(); }
 window.handleAvatarFileChange = function(inputElement) {
     if (inputElement.files && inputElement.files[0]) {
         let reader = new FileReader();
         reader.onload = function(e) { userCustomAvatar = e.target.result; localStorage.setItem('swami_user_avatar', userCustomAvatar); document.getElementById('userProfilePic').src = userCustomAvatar; };
         reader.readAsDataURL(inputElement.files[0]);
     }
 }
 function renderCategoryGridPage() {
     mainAppContent.innerHTML = `<div class="category-page-grid">
         <button class="category-card-btn" onclick="openCategoryFromGrid('iphone')">🍏 iPhone</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('samsung')">📱 Samsung</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('oneplus')">🔴 OnePlus</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('vivo')">💎 Vivo</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('oppo')">✨ Oppo</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('realme')">💛 Realme</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('xiaomi')">🍊 Redmi/Mi</button>
         <button class="category-card-btn" onclick="openCategoryFromGrid('charger')">🔌 Chargers</button>
     </div>`;
 }
 window.openCategoryFromGrid = function(catKey) { activeCategory = catKey; handleNavClick('home', 'nav-home'); }
 window.filterBySpecificCategory = function(catKey) { activeCategory = catKey; if(catKey === "All") { renderUserProductsGrid(allProductsArray); } else { renderUserProductsGrid(allProductsArray.filter(p => p.category === catKey)); } }
 window.handleSearch = function() { let query = document.getElementById('searchInput').value.toLowerCase().trim(); if(query === "") { renderCurrentTab(); } else { renderUserProductsGrid(allProductsArray.filter(p => p.name.toLowerCase().includes(query))); } }
   window.openDetailModal = function(key, name, beforePrice, afterPrice, img, desc) { currentSelectedProduct = { key: key, name: name, beforePrice: beforePrice, price: afterPrice, image: img, description: desc }; document.getElementById('modalProductImg').src = img; document.getElementById('modalProductTitleDetail').innerText = name; document.getElementById('modalProductDesc').innerText = desc; document.getElementById('modalBeforePrice').innerText = beforePrice; document.getElementById('modalAfterPrice').innerText = afterPrice; document.getElementById('productDetailModal').classList.remove('hidden'); }
 window.closeDetailModal = function() { document.getElementById('productDetailModal').classList.add('hidden'); }
 function showCustomToastLive(message) { let toast = document.getElementById('cartToast'); document.getElementById('toastMessage').innerText = message; toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 2000); }
 window.addToCartLive = function() { if(currentSelectedProduct) { userCartArray.push(currentSelectedProduct); localStorage.setItem('swami_cart', JSON.stringify(userCartArray)); closeDetailModal(); showCustomToastLive("Added to cart!"); } }
 function renderCartItemsPage() {
     if (userCartArray.length === 0) { mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:40px 10px;'>🛒 Your cart is empty.</p>"; return; }
     let cartHTML = '<div class="cart-list">'; let totalAmount = 0;
     userCartArray.forEach((item, index) => { let cleanPrice = parseInt(item.price.replace(/[^0-9]/g, '')) || 0; totalAmount += cleanPrice; cartHTML += `<div class="cart-item"><img src="${item.image}"><div class="cart-item-details"><div class="cart-item-title">${item.name}</div><div class="cart-item-price">${item.price}</div></div><button class="cart-remove-btn" onclick="removeFromCartLive(${index})">Remove</button></div>`; });
     cartHTML += `</div><div class="cart-summary"><div class="summary-row"><span>Total Payable:</span><span>₹${totalAmount.toLocaleString('en-IN')}</span></div><button class="checkout-btn" onclick="openOrderModal()">Checkout 🚀</button></div>`; mainAppContent.innerHTML = cartHTML;
 }
 window.removeFromCartLive = function(index) { userCartArray.splice(index, 1); localStorage.setItem('swami_cart', JSON.stringify(userCartArray)); renderCartItemsPage(); }
 window.openOrderModal = function() { document.getElementById('userOrderModal').classList.remove('hidden'); }
 window.closeOrderModal = function() { document.getElementById('userOrderModal').classList.add('hidden'); }
 window.submitOrderLive = function() {
     const name = document.getElementById('orderCustName').value.trim(); const phone = document.getElementById('orderCustPhone').value.trim(); if(!name || !phone) return;
     if(userCartArray.length > 0) { database.ref('orders').push({ customerName: name, customerPhone: phone, items: userCartArray.map(item => ({ productKey: item.key, productName: item.name, price: item.price })), timestamp: Date.now() }).then(() => { userCartArray = []; localStorage.removeItem('swami_cart'); closeOrderModal(); activeCategory = "All"; handleNavClick('home', 'nav-home'); }); }
 }
 </script>
