<!DOCTYPE html> 
<html lang="hi"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
<title>Swami Mobiles</title> 

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style> 
 * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; } 
 html, body { height: 100%; width: 100%; overflow-x: hidden; background: #f4f7f6; } 
 body { 
     min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 12px; position: relative; 
     background: linear-gradient(160deg, #1b2a4a 0%, #1f4e5f 18%, #2a6b6b 35%, #d97a5e 60%, #e2654f 75%, #7a2d3a 100%); 
     background-attachment: fixed;
 } 
 body::before, body::after { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; } 
 body::before { width: 300px; height: 300px; background: rgba(255, 130, 90, 0.45); top: -50px; left: -50px; } 
 body::after { width: 300px; height: 300px; background: rgba(40, 180, 170, 0.4); bottom: -50px; right: -50px; } 
 
 .container { 
     position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; width: 100%; max-width: 360px; background: rgba(255, 255, 255, 0.10); 
     border: 1.5px solid rgba(255, 255, 255, 0.35); border-radius: 22px; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); 
     box-shadow: 0 25px 60px rgba(0,0,0,0.35); padding: 30px 24px; color: #fff; 
 } 
 .tabs { display: flex; gap: 28px; justify-content: center; margin-bottom: 24px; } 
 .tab-btn { background: none; border: none; font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.5); cursor: pointer; padding-bottom: 6px; transition: 0.25s; } 
 .tab-btn.active { color: #fff; font-weight: 600; border-bottom: 2px solid #fff; } 
 .toggle-method { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; } 
 .toggle-method button { padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; cursor: pointer; } 
 .toggle-method button.active { background: #fff; color: #2a6b6b; border-color: #fff; } 
 .input-group { margin-bottom: 20px; } 
 .input-group label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); margin-bottom: 6px; } 
 .input-group input { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,0.55); padding: 6px 2px 8px; font-size: 15px; color: #fff; outline: none; } 
 .input-group input:focus { border-bottom-color: #fff; } 
 .options-row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; margin-bottom: 20px; } 
 .options-row a { color: #fff; text-decoration: none; font-weight: 600; } 
 .checkbox-row { display: flex; align-items: center; gap: 6px; } 
 .submit-btn { width: 100%; padding: 12px 0; background: #fff; color: #2a4a4a; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; } 
 .switch-text { text-align: center; margin-top: 16px; font-size: 13.5px; } 
 .switch-text a { color: #fff; font-weight: 700; text-decoration: underline; cursor: pointer; } 
 .divider { display: flex; align-items: center; text-align: center; margin: 20px 0 14px; color: rgba(255,255,255,0.6); font-size: 12px; } 
 .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.3); } 
 .divider span { padding: 0 10px; } 
 .social-buttons { display: flex; gap: 12px; } 
 .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 0; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 12px; background: rgba(255,255,255,0.08); font-size: 13px; color: #fff; cursor: pointer; } 
 
 .main-header { position: fixed; top: 0; left: 0; width: 100%; padding: 12px 16px; z-index: 100; background: rgba(27, 42, 74, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
 .search-box { display: flex; align-items: center; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 30px; padding: 8px 16px; max-width: 360px; margin: 0 auto; }
 .search-box input { width: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; padding-left: 8px; }
 .search-box input::placeholder { color: rgba(255, 255, 255, 0.6); }

 /* 🛒 BOX VIEW MODERATION GRID (3 COLUMNS) */
 .app-content { 
     position: relative; 
     z-index: 1; 
     width: 100%; 
     max-width: 380px; 
     background: transparent; 
     border-radius: 0; 
     padding: 4px; 
     color: #333; 
     margin-top: 65px; 
     margin-bottom: 90px; 
 }
 .user-grid { 
     display: grid; 
     grid-template-columns: repeat(3, 1fr); 
     gap: 6px; 
     width: 100%; 
     text-align: left; 
 }
 .product-box-card { 
     background: rgba(255, 255, 255, 0.96); 
     border-radius: 10px; 
     padding: 6px; 
     border: 1px solid rgba(255,255,255,0.2); 
     box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
     display: flex; 
     flex-direction: column; 
     justify-content: space-between; 
     cursor: pointer;
 }
 .product-box-card img { 
     width: 100%; 
     aspect-ratio: 1/1; 
     object-fit: cover; 
     border-radius: 6px; 
     background: #fafafa; 
     margin-bottom: 4px; 
 }
 .p-box-title { 
     font-size: 10.5px; 
     font-weight: 700; 
     color: #1b2a4a; 
     margin-bottom: 2px; 
     line-height: 1.2; 
     display: -webkit-box; 
     -webkit-line-clamp: 2; 
     -webkit-box-orient: vertical; 
     overflow: hidden; 
     height: 26px; 
 }
 .price-box-row { 
     margin-bottom: 4px; 
     display: flex; 
     align-items: center; 
     flex-wrap: wrap; 
     gap: 2px;
 }
 .before-p-box { 
     font-size: 8.5px; 
     text-decoration: line-through; 
     color: #888; 
 }
 .after-p-box { 
     font-size: 11px; 
     font-weight: 800; 
     color: #d97a5e; 
 }
 .view-btn-box { 
     background: #2a6b6b; 
     color: #fff; 
     border: none; 
     padding: 5px 2px; 
     width: 100%; 
     border-radius: 6px; 
     font-size: 10px; 
     font-weight: 700; 
     text-align: center; 
 }

 /* 👑 CART STYLING */
 .cart-list { display: flex; flex-direction: column; gap: 10px; width: 100%; padding: 5px 0; }
 .cart-item { background: rgba(255, 255, 255, 0.95); border-radius: 12px; padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
 .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #eee; }
 .cart-item-details { flex: 1; text-align: left; }
 .cart-item-title { font-size: 13px; font-weight: 700; color: #1b2a4a; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
 .cart-item-price { font-size: 13px; font-weight: 800; color: #d97a5e; margin-top: 2px; }
 .cart-remove-btn { background: none; border: none; color: #e2654f; font-size: 12px; font-weight: 700; cursor: pointer; padding: 5px; }
 
 .cart-summary { background: rgba(27, 42, 74, 0.9); border-radius: 16px; padding: 16px; color: #fff; margin-top: 15px; text-align: left; border: 1px solid rgba(255,255,255,0.2); }
 .summary-row { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 8px; }
 .checkout-btn { width: 100%; background: #fff; color: #1b2a4a; border: none; padding: 12px; border-radius: 25px; font-weight: 800; font-size: 14px; cursor: pointer; text-align: center; box-shadow: 0 4px 12px rgba(255,255,255,0.2); transition: 0.2s; }
 .checkout-btn:active { transform: scale(0.97); }

 /* 👑 10 CATEGORIES GRID CONTAINER STYLE */
 .category-page-grid {
     display: grid;
     grid-template-columns: repeat(2, 1fr);
     gap: 12px;
     width: 100%;
     padding: 10px 0;
 }
 .category-card-btn {
     background: rgba(255, 255, 255, 0.15);
     border: 1.5px solid rgba(255, 255, 255, 0.25);
     border-radius: 16px;
     padding: 20px 10px;
     color: #fff;
     font-size: 14px;
     font-weight: 700;
     cursor: pointer;
     text-align: center;
     backdrop-filter: blur(10px);
     -webkit-backdrop-filter: blur(10px);
     transition: all 0.2s ease;
     box-shadow: 0 4px 15px rgba(0,0,0,0.1);
 }
 .category-card-btn:active {
     transform: scale(0.96);
     background: #fff;
     color: #1b2a4a;
 }

 .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10005; }
 .modal-content { background: white; width: 100%; max-width: 340px; padding: 20px; border-radius: 20px; text-align: center; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
 
 /* 📱 DETAIL MODAL STYLE */
 #modalProductImg { width: 100%; max-height: 200px; object-fit: contain; border-radius: 12px; margin-bottom: 12px; background: #f9f9f9; }
 #modalProductTitleDetail { font-size: 18px; font-weight: 700; color: #1b2a4a; margin-bottom: 6px; text-align: left; }
 #modalProductDesc { font-size: 13px; color: #666; text-align: left; margin-bottom: 12px; max-height: 60px; overflow-y: auto; line-height: 1.4; }
 .modal-price-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; justify-content: flex-start; }
 .modal-before-p { font-size: 13px; text-decoration: line-through; color: #999; }
 .modal-after-p { font-size: 18px; font-weight: 800; color: #d97a5e; }
 .add-cart-btn { width: 100%; background: #2a6b6b; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: 700; font-size: 15px; cursor: pointer; box-shadow: 0 4px 12px rgba(42, 107, 107, 0.3); margin-bottom: 8px; }
 .close-txt-btn { width: 100%; background: transparent; color: #e2654f; border: none; font-weight: 600; cursor: pointer; font-size: 13px; padding: 4px 0; }

 .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(20, 35, 55, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: center; padding: 6px 10px 12px 10px; box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4); z-index: 9999; }
 .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: rgba(255, 255, 255, 0.6); font-size: 10px; cursor: pointer; flex: 1; }
 .nav-item svg { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
 .nav-item.active { color: #fff; font-weight: 600; }
 .nav-item.unique-cart { position: relative; top: -14px; background: linear-gradient(135deg, #e2654f 0%, #d97a5e 100%); border: 3px solid #1b2a4a; width: 56px; height: 56px; flex: none; border-radius: 50%; color: #fff; box-shadow: 0 4px 15px rgba(226, 101, 79, 0.4); }
 .nav-item.unique-cart svg { width: 24px; height: 24px; margin: 0; }

 .logout-btn { background: #e2654f; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 20px; width: 100%; max-width: 200px; }
 .hidden { display: none !important; } 
</style> 
</head> 
<body> 
 
 <header class="main-header hidden" id="appHeader">
     <div class="search-box">
         <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:#fff;margin-right:5px;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

 <div class="app-content hidden" id="mainAppContent"></div>

 <div id="productDetailModal" class="modal hidden">
     <div class="modal-content">
         <img id="modalProductImg" src="" alt="Product">
         <h3 id="modalProductTitleDetail">Product Title</h3>
         <p id="modalProductDesc">Product full description text goes here...</p>
         <div class="modal-price-row">
             <span id="modalBeforePrice" class="modal-before-p"></span>
             <span id="modalAfterPrice" class="modal-after-p"></span>
         </div>
         <button class="add-cart-btn" onclick="addToCartLive()">Add to Cart 🛒</button>
         <button class="close-txt-btn" onclick="closeDetailModal()">Close</button>
     </div>
 </div>

 <div id="userOrderModal" class="modal hidden">
     <div class="modal-content">

         <p style="font-size:13px; color:#666; margin-bottom:12px;">ऑर्डर पूरा करने के लिए अपना विवरण भरें।</p>
         <input type="text" id="orderCustName" placeholder="आपका नाम" required>

         <button onclick="closeOrderModal()" style="width: 100%; background: transparent; color: #e2654f; border: none; margin-top: 8px; font-weight:600; cursor:pointer;">Cancel</button>
     </div>
 </div>

 <div class="bottom-nav hidden" id="appBottomNav">
     <button class="nav-item active" id="nav-home" onclick="handleNavClick('home', 'nav-home')">

 <script>
 const firebaseConfig = {
     apiKey: "AIzaSyDiZSWon47tBdSIkUB3qCSsU19LN_FOBgg",
     authDomain: "swami-mobiles-29ee3.firebaseapp.com",
     projectId: "swami-mobiles-29ee3",
     storageBucket: "swami-mobiles-29ee3.firebasestorage.app",
     messagingSenderId: "497794164748",
     appId: "1:497794164748:web:fecc6f04615fa35a5f6629",
     databaseURL: "https://swami-mobiles-29ee3-default-rtdb.firebaseio.com/" 
 };

 firebase.initializeApp(firebaseConfig);
 const auth = firebase.auth();
 const database = firebase.database();

 const authContainer = document.getElementById('authContainer');
 const appHeader = document.getElementById('appHeader');
 const appBottomNav = document.getElementById('appBottomNav');
 const mainAppContent = document.getElementById('mainAppContent');
 
 let currentSelectedProduct = null;
 let allProductsArray = []; 
 let userCartArray = []; // User Local Cart Holder
 let activeCategory = "All";

 // LIVE USER STATE DETECTOR
 auth.onAuthStateChanged((user) => {
     if (user) { 
         activateMainDashboard(); 
     } else {
         deactivateMainDashboard();
     }
 });

 function activateMainDashboard() {
     authContainer.classList.add('hidden'); 
     appHeader.classList.remove('hidden'); 
     appBottomNav.classList.remove('hidden'); 
     mainAppContent.classList.remove('hidden'); 
     loadLiveProducts(); 
 }

 function deactivateMainDashboard() {
     authContainer.classList.remove('hidden'); 
     appHeader.classList.add('hidden'); 
     appBottomNav.classList.add('hidden'); 
     mainAppContent.classList.add('hidden'); 
 }

 window.switchTab = function(tab) {
     document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
     document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
     document.getElementById('loginTabBtn').classList.toggle('active', tab === 'login');
     document.getElementById('signupTabBtn').classList.toggle('active', tab === 'signup');
 }

 // LOGIN
 window.handleLogin = function() {
     const email = document.getElementById('loginEmail').value.trim();
     const password = document.getElementById('loginPassword').value;
     auth.signInWithEmailAndPassword(email, password).catch((err) => alert("Login Error:\n" + err.message));
 }

 // SIGNUP
 window.handleSignup = function() {
     const email = document.getElementById('signupEmail').value.trim();
     const password = document.getElementById('signupPassword').value;
     const confirmPassword = document.getElementById('signupConfirmPassword').value;
     if (password !== confirmPassword) { alert("पासवर्ड मैच नहीं हो रहा है!"); return; }
     auth.createUserWithEmailAndPassword(email, password).catch((err) => alert("Signup Error:\n" + err.message));
 }

 // GOOGLE LOGIN
 window.handleGoogleLogin = function() {
     const provider = new firebase.auth.GoogleAuthProvider();
     auth.signInWithPopup(provider).catch((err) => alert("Google Login Error:\n" + err.message));
 }

 // LOGOUT FUNCTION
 window.handleLogout = function() {
     auth.signOut().then(() => { alert("सफलतापूर्वक लॉगआउट हो गया!"); });
 }

 // LIVE PRODUCTS FETCH
 function loadLiveProducts() {
     mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:20px;'>स्टोर लोड हो रहा है...</p>";
     database.ref('products').on('value', (snapshot) => {
         allProductsArray = [];
         if(snapshot.exists()) {
             snapshot.forEach((childSnapshot) => {
                 let data = childSnapshot.val();
                 data.key = childSnapshot.key; 
                 allProductsArray.push(data);
             });
         }
         renderCurrentTab(); 
     });
 }

 // RENDER PRODUCTS IN BOX TYPE GRID (3 COLUMNS)
 function renderUserProductsGrid(productsToRender) {
     mainAppContent.innerHTML = "";

     if(productsToRender.length > 0) {
         let gridHTML = '<div class="user-grid">';
         productsToRender.forEach((product) => {
             let safeName = (product.name || '').replace(/'/g, "\\'");
             let safeDesc = (product.description || 'कोई विवरण उपलब्ध नहीं है।').replace(/'/g, "\\'").replace(/\n/g, " ");
             let safeImg = product.image || 'https://via.placeholder.com/150';

             gridHTML += `
                 <div class="product-box-card" onclick="openDetailModal('${product.key}', '${safeName}', '${product.beforePrice}', '${product.afterPrice}', '${safeImg}', '${safeDesc}')">
                     <img src="${safeImg}" alt="Product">
                     <div>
                         <div class="p-box-title">${product.name}</div>
                         <div class="price-box-row">
                             <span class="before-p-box">${product.beforePrice}</span>
                             <span class="after-p-box">${product.afterPrice}</span>
                         </div>
                     </div>
                     <div class="view-btn-box">View</div>
                 </div>`;
         });
         gridHTML += '</div>';
         mainAppContent.innerHTML = gridHTML;
     } else {
         mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:40px 10px;'>इस कैटेगरी में कोई प्रोडक्ट नहीं मिला।</p>";
     }
 }

 // 👑 HANDLE BOTTOM NAVIGATION TABS LIVE
 let currentTab = "home";
 window.handleNavClick = function(tabName, navId) {
     document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
     document.getElementById(navId).classList.add('active');
     currentTab = tabName;
     renderCurrentTab();
 }

 function renderCurrentTab() {
     if (currentTab === "home") {
         activeCategory = "All";
         renderUserProductsGrid(allProductsArray);
     } else if (currentTab === "category") {
         renderCategoryGridPage();
     } else if (currentTab === "cart") {
         renderCartItemsPage(); // लोड कार्ट फंक्शन
     } else if (currentTab === "offers") {
         mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:40px 10px;'>🔥 महासेल डील्स जल्द आ रही हैं!</p>";
     } else if (currentTab === "me") {
         let user = auth.currentUser;
         mainAppContent.innerHTML = `
             <div style='text-align:center;color:#fff;padding:40px 20px;'>
                 <h3>👤 मेरा अकाउंट</h3>
                 <p style='margin: 10px 0; color:rgba(255,255,255,0.8);'>${user ? user.email : 'Guest Mode'}</p>
                 <button class='logout-btn' onclick='handleLogout()'>लॉग आउट (Sign Out)</button>
             </div>`;
     }
 }

 // RENDER 10 CATEGORIES GRID
 function renderCategoryGridPage() {
     mainAppContent.innerHTML = `
         <div class="category-page-grid">
             <button class="category-card-btn" onclick="filterBySpecificCategory('iphone')">🍏 iPhone</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('samsung')">📱 Samsung</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('oneplus')">🔴 OnePlus</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('vivo')">💎 Vivo</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('oppo')">✨ Oppo</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('realme')">💛 Realme</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('xiaomi')">🍊 Redmi/Mi</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('charger')">🔌 Chargers</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('cable')">🎗️ Cables</button>
             <button class="category-card-btn" onclick="filterBySpecificCategory('buds')">🎧 Earbuds</button>
         </div>`;
 }

 // FILTER PRODUCTS ACCORDING TO SELECTED CATEGORY KEY
 window.filterBySpecificCategory = function(catKey) {
     activeCategory = catKey;
     let filtered = allProductsArray.filter(p => p.category === catKey);
     renderUserProductsGrid(filtered);
 }

 // SEARCH SYSTEM
 window.handleSearch = function() {
     let query = document.getElementById('searchInput').value.toLowerCase().trim();
     if(query === "") {
         renderCurrentTab();
     } else {
         let matched = allProductsArray.filter(p => p.name.toLowerCase().includes(query));
         renderUserProductsGrid(matched);
     }
 }

 // 📱 OPEN DETAIL MODAL FUNCTION
 window.openDetailModal = function(key, name, beforePrice, afterPrice, img, desc) {
     currentSelectedProduct = { key: key, name: name, beforePrice: beforePrice, price: afterPrice, image: img, description: desc };
     
     document.getElementById('modalProductImg').src = img;
     document.getElementById('modalProductTitleDetail').innerText = name;
     document.getElementById('modalProductDesc').innerText = desc;
     document.getElementById('modalBeforePrice').innerText = beforePrice;
     document.getElementById('modalAfterPrice').innerText = afterPrice;
     
     document.getElementById('productDetailModal').classList.remove('hidden');
 }

 window.closeDetailModal = function() {
     document.getElementById('productDetailModal').classList.add('hidden');
 }

 // 🛒 ADD TO CART TRIGGER LIVE
 window.addToCartLive = function() {
     if(currentSelectedProduct) {
         userCartArray.push(currentSelectedProduct);
         alert(`${currentSelectedProduct.name} को आपके कार्ट में जोड़ दिया गया है!`);
         closeDetailModal();
     }
 }

 // 👑 RENDER CART DYNAMICALLY WITH TOTAL & CHECKOUT
 function renderCartItemsPage() {
     if (userCartArray.length === 0) {
         mainAppContent.innerHTML = "<p style='text-align:center;color:#fff;padding:40px 10px;'>🛒 आपका कार्ट खाली है।</p>";
         return;
     }

     let cartHTML = '<div class="cart-list">';
     let totalAmount = 0;

     userCartArray.forEach((item, index) => {
         // नंबर साफ़ करने के लिए ताकि कैलकुलेशन सही हो (उदा. ₹15,000 -> 15000)
         let cleanPrice = parseInt(item.price.replace(/[^0-8]/g, '')) || 0;
         totalAmount += cleanPrice;

         cartHTML += `
             <div class="cart-item">
                 <img src="${item.image}" alt="Product">
                 <div class="cart-item-details">
                     <div class="cart-item-title">${item.name}</div>
                     <div class="cart-item-price">${item.price}</div>
                 </div>
                 <button class="cart-remove-btn" onclick="removeFromCartLive(${index})">Remove</button>
             </div>`;
     });

     cartHTML += '</div>';

     // टोटल और चेकआउट ब्लॉक जोड़ना
     cartHTML += `
         <div class="cart-summary">
             <div class="summary-row">
                 <span>Total Payable:</span>
                 <span>₹${totalAmount.toLocaleString('en-IN')}</span>
             </div>
             <button class="checkout-btn" onclick="openOrderModal()">Checkout (Order Now) 🚀</button>
         </div>`;

     mainAppContent.innerHTML = cartHTML;
 }

 // REMOVE ITEM FROM CART
 window.removeFromCartLive = function(index) {
     userCartArray.splice(index, 1);
     renderCartItemsPage();
 }

 // ORDER MODAL FUNCTIONS
 window.openOrderModal = function() {
     document.getElementById('userOrderModal').classList.remove('hidden');
 }

 window.closeOrderModal = function() {
     document.getElementById('userOrderModal').classList.add('hidden');
     document.getElementById('orderCustName').value = "";
     document.getElementById('orderCustPhone').value = "";
 }

 // FINALIZE & SUBMIT ENTIRE CART ORDER TO FIREBASE
 window.submitOrderLive = function() {
     const name = document.getElementById('orderCustName').value.trim();
     const phone = document.getElementById('orderCustPhone').value.trim();

     if(!name || !phone) {
         alert("कृपया अपना नाम और मोबाइल नंबर दर्ज करें!");
         return;
     }

     if(userCartArray.length > 0) {
         // कार्ट के सभी आइटम्स का डेटा कलेक्ट करना
         const itemsOrdered = userCartArray.map(item => ({
             productKey: item.key,
             productName: item.name,
             price: item.price
         }));

         const orderData = {
             customerName: name,
             customerPhone: phone,
             items: itemsOrdered,
             timestamp: Date.now()
         };

         database.ref('orders').push(orderData).then(() => {
             alert("आपका ऑर्डर सफलतापूर्वक दर्ज हो गया है!");
             userCartArray = []; // ऑर्डर होते ही कार्ट खाली करें
             closeOrderModal();
             handleNavClick('home', 'nav-home'); // होम पर भेजें
         }).catch((err) => {
             alert("ऑर्डर दर्ज करने में समस्या आई: " + err.message);
         });
     }
 }
 </script>
</body>
</html>
